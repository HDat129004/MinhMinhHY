<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chi tiết sản phẩm – Minh Minh Hưng Yên</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    .product-detail-page { padding-top: var(--nav-height); min-height: 100vh; }

    .detail-header {
      padding: 20px 0;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
    }

    .detail-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      padding: 40px 0 0;
    }

    .product-main-img {
      aspect-ratio: 1/1;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 120px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
      transition: var(--ease);
    }
    .product-main-img::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at center, rgba(228,182,83,0.05) 0%, transparent 70%);
    }
    .product-main-img:hover { border-color: var(--border-gold); }

    .discount-ribbon {
      position: absolute; top: 20px; left: 20px;
      background: var(--error); color: white;
      font-size: 14px; font-weight: 700;
      padding: 6px 14px; border-radius: var(--radius-sm);
    }

    .gallery-thumbs { display: flex; gap: 12px; flex-wrap: wrap; }
    .thumb {
      width: 72px; height: 72px;
      background: var(--bg-elevated);
      border: 2px solid var(--border);
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; cursor: pointer; transition: var(--ease);
    }
    .thumb.active, .thumb:hover { border-color: var(--gold); background: var(--gold-glow); }

    .detail-brand { display: inline-flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .brand-badge {
      padding: 4px 12px;
      background: var(--gold-glow);
      border: 1px solid var(--border-gold);
      border-radius: var(--radius-full);
      font-size: 12px; font-weight: 700; color: var(--gold);
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .cat-badge {
      padding: 4px 12px;
      background: rgba(0,212,255,0.08);
      border: 1px solid rgba(0,212,255,0.2);
      border-radius: var(--radius-full);
      font-size: 12px; font-weight: 600; color: var(--cyan);
    }

    .detail-name {
      font-family: var(--font-ui);
      font-size: clamp(20px, 3vw, 28px);
      font-weight: 800; color: var(--text-primary);
      line-height: 1.3; margin-bottom: 16px;
    }

    .detail-price-row {
      display: flex; align-items: baseline; gap: 12px; margin-bottom: 8px;
    }
    .detail-price {
      font-family: var(--font-ui);
      font-size: 32px; font-weight: 800; color: var(--gold);
    }
    .detail-original-price {
      font-size: 18px; color: var(--text-muted); text-decoration: line-through;
    }
    .detail-discount-badge {
      padding: 4px 10px;
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 700; color: var(--error);
    }

    .stock-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px;
      border-radius: var(--radius-full);
      font-size: 13px; font-weight: 600; margin-bottom: 20px;
    }
    .stock-in { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); color: var(--success); }
    .stock-out { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: var(--error); }

    .detail-desc {
      font-size: 14px; color: var(--text-secondary);
      line-height: 1.7; margin-bottom: 24px;
      padding: 16px; background: var(--bg-elevated);
      border-radius: var(--radius-md);
      border-left: 3px solid var(--border-gold);
    }

    .qty-section { margin-bottom: 20px; }
    .qty-label { font-size: 13px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
    .qty-control {
      display: inline-flex; align-items: center;
      background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: var(--radius-md); overflow: hidden;
    }
    .qty-btn {
      width: 44px; height: 44px;
      background: none; border: none;
      color: var(--text-secondary); font-size: 20px;
      cursor: pointer; transition: var(--ease);
      display: flex; align-items: center; justify-content: center;
    }
    .qty-btn:hover { background: var(--gold-glow); color: var(--gold); }
    .qty-input {
      width: 60px; height: 44px;
      background: none; border: none;
      color: var(--text-primary); font-size: 16px; font-weight: 700;
      text-align: center; font-family: var(--font-main); outline: none;
    }

    .detail-actions { display: flex; gap: 12px; margin-bottom: 24px; }
    .btn-add-cart {
      flex: 1; padding: 14px 20px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-gold);
      border-radius: var(--radius-lg);
      color: var(--gold); font-size: 15px; font-weight: 700;
      cursor: pointer; transition: var(--ease); font-family: var(--font-main);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-add-cart:hover { background: var(--gold-glow); transform: translateY(-1px); }
    .btn-add-cart:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-buy-now {
      flex: 1; padding: 14px 20px;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      border: none; border-radius: var(--radius-lg);
      color: var(--bg-base); font-size: 15px; font-weight: 700;
      cursor: pointer; transition: var(--ease); font-family: var(--font-main);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 6px 20px rgba(228,182,83,0.3);
    }
    .btn-buy-now:hover { transform: translateY(-1px); box-shadow: 0 10px 30px rgba(228,182,83,0.4); }
    .btn-buy-now:disabled { opacity: 0.4; cursor: not-allowed; }

    .feature-tags { display: flex; gap: 8px; flex-wrap: wrap; }
    .feature-tag {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-full);
      font-size: 12px; font-weight: 600; color: var(--text-secondary);
      transition: var(--ease);
    }
    .feature-tag:hover { border-color: var(--border-gold); color: var(--gold); }

    .detail-tabs { margin-top: 48px; }
    .tabs-nav { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 28px; }
    .tab-btn {
      padding: 12px 24px;
      background: none; border: none;
      font-size: 14px; font-weight: 600;
      color: var(--text-secondary); cursor: pointer;
      transition: var(--ease);
      border-bottom: 2px solid transparent;
      margin-bottom: -1px; font-family: var(--font-main);
    }
    .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
    .tab-btn:hover { color: var(--text-primary); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .specs-box { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }

    .related-section { padding: 48px 0 80px; }

    .error-state { text-align: center; padding: 120px var(--space-lg); }
    .error-state h2 { font-size: 28px; font-weight: 700; margin-bottom: 12px; }
    .error-state p { color: var(--text-secondary); margin-bottom: 28px; }

    @media (max-width: 900px) {
      .detail-layout { grid-template-columns: 1fr; gap: 24px; }
    }
    @media (max-width: 480px) {
      .detail-actions { flex-direction: column; }
      .detail-price { font-size: 26px; }
    }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div class="product-detail-page">
    <div class="detail-header">
      <div class="container">
        <nav class="breadcrumb" id="breadcrumb">
          <a href="index.html">Trang chủ</a>
          <span class="breadcrumb-sep">›</span>
          <a href="products.html">Sản phẩm</a>
          <span class="breadcrumb-sep">›</span>
          <span class="breadcrumb-current" id="bc-cat">—</span>
          <span class="breadcrumb-sep">›</span>
          <span class="breadcrumb-current" id="bc-name">Đang tải...</span>
        </nav>
      </div>
    </div>

    <div class="container">
      <div id="error-state" class="error-state" style="display:none;">
        <div style="font-size:64px;margin-bottom:16px;">😔</div>
        <h2>Không tìm thấy sản phẩm</h2>
        <p>Sản phẩm này không tồn tại hoặc đã bị xóa khỏi hệ thống.</p>
        <a href="products.html" class="btn btn-primary btn-lg">← Quay lại danh sách</a>
      </div>

      <div id="product-detail" style="display:none;">
        <div class="detail-layout">
          <!-- IMAGE PANEL -->
          <div class="detail-image-panel">
            <div class="product-main-img">
              <span id="main-emoji" style="font-size:120px;">📦</span>
              <div class="discount-ribbon" id="discount-ribbon" style="display:none;"></div>
            </div>
            <div class="gallery-thumbs" id="gallery-thumbs"></div>
          </div>

          <!-- INFO PANEL -->
          <div class="detail-info-panel">
            <div class="detail-brand">
              <span class="brand-badge" id="p-brand">—</span>
              <span class="cat-badge" id="p-cat">—</span>
            </div>
            <h1 class="detail-name" id="p-name">—</h1>

            <div class="detail-price-row">
              <span class="detail-price" id="p-price">—</span>
              <span class="detail-original-price" id="p-orig-price" style="display:none;"></span>
              <span class="detail-discount-badge" id="p-discount" style="display:none;"></span>
            </div>

            <div id="p-stock" class="stock-badge stock-in">● Còn hàng</div>

            <p class="detail-desc" id="p-desc">—</p>

            <div class="qty-section">
              <div class="qty-label">Số lượng</div>
              <div class="qty-control">
                <button class="qty-btn" onclick="changeQty(-1)">−</button>
                <input type="number" class="qty-input" id="qty-input" value="1" min="1" max="99">
                <button class="qty-btn" onclick="changeQty(1)">+</button>
              </div>
            </div>

            <div class="detail-actions">
              <button class="btn-add-cart" id="btn-add-cart" onclick="addToCart()">🛒 Thêm vào giỏ hàng</button>
              <button class="btn-buy-now" id="btn-buy-now" onclick="buyNow()">⚡ Mua ngay</button>
            </div>

            <div class="feature-tags">
              <span class="feature-tag">🛡️ Bảo hành 12 tháng</span>
              <span class="feature-tag">✅ Hàng chính hãng</span>
              <span class="feature-tag">🚚 Giao hàng toàn quốc</span>
              <span class="feature-tag">🔄 Đổi trả 7 ngày</span>
            </div>
          </div>
        </div>

        <!-- TABS -->
        <div class="detail-tabs">
          <div class="tabs-nav">
            <button class="tab-btn active" onclick="switchTab('specs', this)">📋 Thông số kỹ thuật</button>
            <button class="tab-btn" onclick="switchTab('desc', this)">📝 Mô tả chi tiết</button>
          </div>
          <div class="tab-panel active" id="tab-specs">
            <div class="specs-box">
              <table class="specs-table" id="specs-table"><tbody></tbody></table>
            </div>
          </div>
          <div class="tab-panel" id="tab-desc">
            <div style="padding:24px;background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);">
              <p id="full-desc" style="font-size:15px;color:var(--text-secondary);line-height:1.8;"></p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- RELATED PRODUCTS -->
    <div class="related-section" id="related-section" style="display:none;">
      <div class="container">
        <div class="divider-gold"></div>
        <div class="section-eyebrow" style="margin-bottom:8px;">Gợi ý cho bạn</div>
        <h2 class="section-title related-section" style="font-size:24px;padding:0;margin-bottom:24px;">Sản phẩm liên quan</h2>
        <div class="products-grid stagger" id="related-grid"></div>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>
  <script src="js/app.js"></script>
  <script>
    let currentProduct = null;

    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (!id) { showError(); return; }
      const product = Store.getProduct(id);
      if (!product) { showError(); return; }
      currentProduct = product;
      renderProduct(product);
      renderRelated(product);
    });

    function showError() {
      document.getElementById('error-state').style.display = 'block';
    }

    function renderProduct(p) {
      document.title = p.name + ' – Minh Minh Store';
      document.getElementById('bc-cat').textContent = p.category || '—';
      document.getElementById('bc-name').textContent = p.name.length > 30 ? p.name.slice(0, 30) + '…' : p.name;

      document.getElementById('main-emoji').textContent = p.images?.[0] || '📦';

      const disc = UI.discountPercent(p.price, p.originalPrice);
      if (disc > 0) {
        const ribbon = document.getElementById('discount-ribbon');
        ribbon.textContent = '-' + disc + '%';
        ribbon.style.display = '';
      }

      if (p.images && p.images.length > 0) {
        document.getElementById('gallery-thumbs').innerHTML = p.images.map((img, i) => `
          <div class="thumb ${i === 0 ? 'active' : ''}" onclick="selectThumb(this, '${img}')">${img}</div>
        `).join('');
      }

      document.getElementById('p-brand').textContent = p.brand || '—';
      document.getElementById('p-cat').textContent = p.category || '—';
      document.getElementById('p-name').textContent = p.name;
      document.getElementById('p-price').textContent = UI.formatPrice(p.price);
      document.getElementById('p-desc').textContent = p.description || '';
      document.getElementById('full-desc').textContent = p.description || '';

      if (p.originalPrice && p.originalPrice > p.price) {
        document.getElementById('p-orig-price').textContent = UI.formatPrice(p.originalPrice);
        document.getElementById('p-orig-price').style.display = '';
        document.getElementById('p-discount').textContent = '-' + disc + '%';
        document.getElementById('p-discount').style.display = '';
      }

      const stockEl = document.getElementById('p-stock');
      if (p.stock <= 0) {
        stockEl.textContent = 'Hết hàng';
        stockEl.className = 'stock-badge stock-out';
        document.getElementById('btn-add-cart').disabled = true;
        document.getElementById('btn-buy-now').disabled = true;
      } else {
        stockEl.innerHTML = '● Còn hàng (' + p.stock + ' sản phẩm)';
        document.getElementById('qty-input').max = p.stock;
      }

      const tbody = document.querySelector('#specs-table tbody');
      if (p.specs && Object.keys(p.specs).length > 0) {
        tbody.innerHTML = Object.entries(p.specs).map(([k, v]) =>
          '<tr><td>' + k + '</td><td>' + v + '</td></tr>'
        ).join('');
      } else {
        tbody.innerHTML = '<tr><td colspan="2" style="text-align:center;color:var(--text-muted);padding:24px;">Chưa có thông số kỹ thuật</td></tr>';
      }

      document.getElementById('product-detail').style.display = '';
    }

    function renderRelated(p) {
      const related = Store.getProducts()
        .filter(r => r.active && r.id !== p.id && r.category === p.category)
        .slice(0, 4);
      if (related.length > 0) {
        document.getElementById('related-section').style.display = '';
        document.getElementById('related-grid').innerHTML = related.map(r => renderProductCard(r)).join('');
      }
    }

    function selectThumb(el, emoji) {
      document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('main-emoji').textContent = emoji;
    }

    function changeQty(delta) {
      const input = document.getElementById('qty-input');
      const val = parseInt(input.value) + delta;
      const max = parseInt(input.max) || 99;
      input.value = Math.max(1, Math.min(max, val));
    }

    function addToCart() {
      if (!currentProduct) return;
      const qty = parseInt(document.getElementById('qty-input').value) || 1;
      Cart.addItem(currentProduct, qty);
      UI.toast('Đã thêm ' + qty + 'x "' + currentProduct.name + '" vào giỏ hàng!', 'success');
    }

    function buyNow() {
      if (!currentProduct) return;
      const qty = parseInt(document.getElementById('qty-input').value) || 1;
      Cart.addItem(currentProduct, qty);
      window.location.href = 'cart.html';
    }

    function switchTab(tab, btn) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + tab).classList.add('active');
    }
  </script>
</body>
</html>
