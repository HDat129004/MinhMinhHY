<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập Quản trị — Minh Minh Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/admin.css" />
  <style>
    /* Circuit / grid background pattern */
    .login-bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(228,182,83,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(228,182,83,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    /* Circuit nodes */
    .circuit-node {
      position: absolute;
      width: 6px; height: 6px;
      border: 1px solid rgba(228,182,83,0.25);
      border-radius: 50%;
      pointer-events: none;
    }
    .circuit-node::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 3px; height: 3px;
      background: rgba(228,182,83,0.4);
      border-radius: 50%;
    }
    .circuit-line-h {
      position: absolute;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(228,182,83,0.2), transparent);
      pointer-events: none;
    }
    .circuit-line-v {
      position: absolute;
      width: 1px;
      background: linear-gradient(180deg, transparent, rgba(228,182,83,0.2), transparent);
      pointer-events: none;
    }

    /* Shake animation */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      15% { transform: translateX(-8px); }
      30% { transform: translateX(8px); }
      45% { transform: translateX(-6px); }
      60% { transform: translateX(6px); }
      75% { transform: translateX(-4px); }
      90% { transform: translateX(4px); }
    }
    .shake { animation: shake 0.5s ease both; }

    /* Remember me row */
    .login-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-lg);
    }
    .checkbox-label {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      font-size: 14px;
      color: var(--text-secondary);
      cursor: pointer;
      user-select: none;
    }
    .checkbox-label input[type="checkbox"] {
      width: 16px; height: 16px;
      accent-color: var(--gold);
      cursor: pointer;
    }
    .forgot-link {
      font-size: 13px;
      color: var(--gold);
      transition: opacity var(--ease);
    }
    .forgot-link:hover { opacity: 0.7; }

    /* Error message */
    .login-error {
      display: none;
      align-items: center;
      gap: var(--space-sm);
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: var(--radius-md);
      padding: 10px var(--space-md);
      color: var(--error);
      font-size: 13px;
      margin-bottom: var(--space-lg);
    }
    .login-error.visible { display: flex; }

    /* Login button */
    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: var(--bg-base);
      font-size: 15px;
      font-weight: 700;
      font-family: var(--font-ui);
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: var(--ease);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-sm);
      box-shadow: 0 4px 16px rgba(228,182,83,0.3);
      letter-spacing: 0.3px;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(228,182,83,0.4);
    }
    .btn-login:active { transform: translateY(0); }

    /* Form divider */
    .login-divider {
      text-align: center;
      margin-top: var(--space-xl);
      color: var(--text-muted);
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: var(--space-md);
    }
    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Admin badge at bottom */
    .login-admin-badge {
      text-align: center;
      margin-top: var(--space-md);
      font-size: 12px;
      color: var(--text-muted);
    }
    .login-admin-badge span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-full);
      padding: 4px 12px;
    }
    .login-admin-badge .dot {
      width: 6px; height: 6px;
      background: var(--success);
      border-radius: 50%;
      animation: pulse-dot 2s ease infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Pulsing glow ring behind logo */
    @keyframes glow-pulse {
      0%, 100% { box-shadow: 0 0 30px rgba(228,182,83,0.2); }
      50%       { box-shadow: 0 0 60px rgba(228,182,83,0.4); }
    }
    .login-logo-icon { animation: glow-pulse 3s ease infinite; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="login-page">
    <!-- Backgrounds -->
    <div class="login-bg"></div>
    <div class="login-bg-grid"></div>

    <!-- Circuit decorations -->
    <div class="circuit-node" style="top:15%;left:10%;"></div>
    <div class="circuit-node" style="top:30%;right:12%;"></div>
    <div class="circuit-node" style="bottom:20%;left:8%;"></div>
    <div class="circuit-node" style="bottom:35%;right:15%;"></div>
    <div class="circuit-node" style="top:60%;left:22%;"></div>
    <div class="circuit-line-h" style="top:15%;left:10%;width:120px;"></div>
    <div class="circuit-line-v" style="top:15%;left:10%;height:80px;"></div>
    <div class="circuit-line-h" style="bottom:20%;right:8%;width:100px;right:8%;"></div>
    <div class="circuit-line-v" style="bottom:20%;right:15%;height:100px;"></div>

    <!-- Login Card -->
    <div class="login-card">
      <!-- Logo -->
      <div class="login-logo" style="display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:var(--space-xl);">
        <div style="font-size: 3rem; font-weight: 900; letter-spacing: -3px; line-height: 1; display:flex; margin-bottom: 8px;">
          <span style="color: var(--orange);">M</span><span style="color: var(--green);">M</span>
        </div>
        <div style="text-align:center;">
          <strong style="font-size: 18px; color: var(--text-primary); font-family: var(--font-ui); font-weight: 800; letter-spacing: -0.5px;">MINH MINH HƯNG YÊN</strong>
          <span style="display:block; font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 4px;">Hệ thống quản trị</span>
        </div>
      </div>

      <!-- Error message -->
      <div class="login-error" id="login-error">
        <span>🚫</span>
        <span id="login-error-text">Tên đăng nhập hoặc mật khẩu không đúng.</span>
      </div>

      <!-- Form -->
      <form id="login-form" onsubmit="handleLogin(event)">
        <!-- Username -->
        <div class="form-group">
          <label class="form-label" for="username">Tên đăng nhập</label>
          <div style="position:relative;">
            <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;">👤</span>
            <input
              type="text"
              id="username"
              class="form-control"
              style="padding-left:40px;"
              placeholder="Nhập tên đăng nhập"
              autocomplete="username"
              required
            />
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label" for="password">Mật khẩu</label>
          <div class="input-with-toggle" style="position:relative;">
            <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;z-index:1;">🔒</span>
            <input
              type="password"
              id="password"
              class="form-control"
              style="padding-left:40px;"
              placeholder="Nhập mật khẩu"
              autocomplete="current-password"
              required
            />
            <button type="button" class="password-toggle-btn" id="pwd-toggle" onclick="togglePassword()" title="Hiển thị/ẩn mật khẩu">👁️</button>
          </div>
        </div>

        <!-- Options row -->
        <div class="login-options">
          <label class="checkbox-label">
            <input type="checkbox" id="remember-me" />
            Ghi nhớ đăng nhập
          </label>
          <a href="#" class="forgot-link" onclick="showForgotMsg(event)">Quên mật khẩu?</a>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-login" id="login-btn">
          <span id="login-btn-icon">⚡</span>
          <span id="login-btn-text">Đăng nhập</span>
        </button>
      </form>

      <div class="login-divider">Hệ thống quản trị nội bộ</div>

      <div class="login-admin-badge">
        <span>
          <span class="dot"></span>
          Minh Minh Store Admin v2.0
        </span>
      </div>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/admin.js"></script>
  <script>
    // Redirect if already logged in
    if (localStorage.getItem('mm_admin_auth') === 'true') {
      window.location.href = 'dashboard.html';
    }

    function togglePassword() {
      const pwdInput = document.getElementById('password');
      const toggleBtn = document.getElementById('pwd-toggle');
      if (pwdInput.type === 'password') {
        pwdInput.type = 'text';
        toggleBtn.textContent = '🙈';
      } else {
        pwdInput.type = 'password';
        toggleBtn.textContent = '👁️';
      }
    }

    function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('login-error');
      const card = document.querySelector('.login-card');
      const btn = document.getElementById('login-btn');
      const btnText = document.getElementById('login-btn-text');
      const btnIcon = document.getElementById('login-btn-icon');

      // Loading state
      btn.disabled = true;
      btnIcon.textContent = '⏳';
      btnText.textContent = 'Đang xác thực...';

      setTimeout(() => {
        if (username === 'admin' && password === 'minhminh2024') {
          // Success
          localStorage.setItem('mm_admin_auth', 'true');
          btnIcon.textContent = '✅';
          btnText.textContent = 'Thành công! Đang chuyển hướng...';
          btn.style.background = 'linear-gradient(135deg, var(--success), #059669)';
          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 800);
        } else {
          // Error
          btn.disabled = false;
          btnIcon.textContent = '⚡';
          btnText.textContent = 'Đăng nhập';
          errorEl.classList.add('visible');
          card.classList.add('shake');
          document.getElementById('password').value = '';
          setTimeout(() => card.classList.remove('shake'), 600);
        }
      }, 700);
    }

    function showForgotMsg(e) {
      e.preventDefault();
      alert('Vui lòng liên hệ quản trị viên hệ thống để được hỗ trợ khôi phục mật khẩu.\n📞 Hotline: 0368 386 357');
    }
  </script>
</body>
</html>
