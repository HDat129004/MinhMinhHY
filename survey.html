<!DOCTYPE HTML>
<html lang="vi" class="smt-html"><head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    
    <!-- Styles -->
    <style>

/* Reset & Base Styles */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 400;
    font-size: 15px;
    line-height: 20px;
    color: #333;
    background-color: #fff;
}

/* Survey Container */
.survey-container {
    position: relative;
    width: 100%;
    min-height: 100vh;
    background: #fff;
    overflow-x: hidden;
}

/* Close Button */
.close-button {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 24px;
    height: 24px;
    padding: 0;
    border: none;
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    transition: opacity 0.2s ease;
}

.close-button:hover {
    opacity: 0.7;
}

/* Survey Wrapper */
.survey-wrapper {
    padding: 44px 20px 20px;
}

/* Question Title */
.question-title {
    font-size: 15px;
    font-weight: 500;
    line-height: 20px;
    text-align: center;
    color: #333;
    margin-bottom: 24px;
}

.question-title b {
    font-weight: 600;
    display: block;
}

/* Emoji Rating Section */
.emoji-rating {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    margin: 30px 0;
    padding: 0 20px;
    gap: 60px;
}

.emoji-option {
    flex: 0 0 auto;
    width: 56px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.emoji-rating input {
    display: none;
}

.emoji-rating label {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    transition: transform 0.2s ease;
}

.emoji-svg {
    width: 56px;
    height: 56px;
    display: block;
    margin-bottom: 8px;
}

.emoji-text {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px;
    line-height: 20px;
    font-weight: 500;
    color: #666;
    text-align: center;
    white-space: nowrap;
    display: block;
    /* Remove position: absolute */
    width: max-content; /* Let the text have its natural width */
    transform: translateX(0); /* Remove transform */
}


/* Emoji Fill Colors */
.emoji-fill {
    fill: #D9D9D9;
    transition: fill 0.2s ease;
}

/* Bad Rating */
.emoji-rating input[value="1"]:checked + label .emoji-fill,
.emoji-rating label[for="food-bad"]:hover .emoji-fill {
    fill: #ff4d4f;
}

.emoji-rating input[value="1"]:checked + label .emoji-text,
.emoji-rating label[for="food-bad"]:hover .emoji-text {
    color: #ff4d4f;
}

/* OK Rating */
.emoji-rating input[value="2"]:checked + label .emoji-fill,
.emoji-rating label[for="food-ok"]:hover .emoji-fill {
    fill: #faad14;
}

.emoji-rating input[value="2"]:checked + label .emoji-text,
.emoji-rating label[for="food-ok"]:hover .emoji-text {
    color: #faad14;
}

/* Good Rating */
.emoji-rating input[value="3"]:checked + label .emoji-fill,
.emoji-rating label[for="food-good"]:hover .emoji-fill {
    fill: #52c41a;
}

.emoji-rating input[value="3"]:checked + label .emoji-text,
.emoji-rating label[for="food-good"]:hover .emoji-text {
    color: #52c41a;
}

/* Error Message */
.error-message {
    color: #ff4d4f;
    font-size: 15px;
    line-height: 20px;
    text-align: center;
    margin-bottom: 16px;
    display: none;
}

/* Feedback Section */
.feedback-input {
    width: 100%;
    min-height: 50px;
    padding: 12px;
    border: 1px solid #d9d9d9;
    border-radius: 6px;
    margin: 8px 0 24px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 15px;
    line-height: 20px;
    resize: none;
    transition: border-color 0.3s ease;
}

.feedback-input:focus {
    outline: none;
    border-color: #E4B653;
}

.feedback-input::placeholder {
    color: #999;
    text-align: left;
}

/* Button Group */
.button-group {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 20px;
}

.btn {
    flex: 1;
    height: 40px;
    padding: 0 16px;
    border: none;
    border-radius: 4px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px;
    line-height: 20px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s ease;
}

.btn:active {
    transform: scale(0.98);
}

.btn-skip {
    background-color: #f5f5f5;
    color: #666;
}

.btn-skip:hover:not(:disabled) {
    background-color: #e8e8e8;
}

.btn-submit {
    background-color: #ea580c;
    color: white;
}

.btn-submit:hover:not(:disabled) {
    background-color: #c2410c;
}

.btn:disabled {
    opacity: 0.7;
    cursor: not-allowed;
}

/* Loading Spinner */
.loading-spinner {
    display: none;
    width: 24px;
    height: 24px;
    margin: 20px auto;
    border: 2px solid #f3f3f3;
    border-top: 2px solid #ea580c;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* Thank You Screen */
.thank-you-screen {
    display: none;
    text-align: center;
    animation: fadeIn 0.5s ease-out;
}

.thank-you-icon {
    width: 80px;
    height: 80px;
    margin: 0 auto 24px;
    animation: scaleIn 0.5s ease-out 0.2s both;
}

.thank-you-title {
    font-size: 20px;
    font-weight: 600;
    color: #ea580c;
    margin-bottom: 16px;
    animation: slideUp 0.5s ease-out 0.4s both;
}

.thank-you-message {
    font-size: 15px;
    line-height: 20px;
    color: #666;
    margin-bottom: 32px;
    animation: slideUp 0.5s ease-out 0.6s both;
}

/* Animations */
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes scaleIn {
    from {
        transform: scale(0);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 1;
    }
}

@keyframes slideUp {
    from {
        transform: translateY(20px);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

/* Small Screen Adjustments */
@media screen and (max-width: 360px) {
    .emoji-rating {
        gap: 40px;
        padding: 0 15px;
    }
    
    .emoji-option {
        width: 48px;
    }

    .emoji-svg {
        width: 48px;
        height: 48px;
    }

    .emoji-text {
        font-size: 12px;
    }
}

   <script>
       // Constants
       const CONSTANTS = {
           MAX_LENGTH: 400,
           TIMEOUT: 10000,
           THANK_YOU_DELAY: 2000,
           PANEL_ID: 'ADGMOT35CHFLVDHBJNIG50K968ATNH2U64O9DCMJJB5NUPEKAJIG',
           WEBSITE_ID: '5cdd4beada7e144a35368d6880304576',
           LOCAL_STORAGE_KEY: 'surveyProgress',
           SURVEY_NAME: 'khảo sát booking app'
       };

       // State Management
       let startTime = Date.now();
       let isSubmitting = false;

       // Initialize Smartech
       smartech('create', CONSTANTS.PANEL_ID);
       smartech('register', CONSTANTS.WEBSITE_ID);

       // DOM Elements Helper
       const elements = {
           form: () => document.getElementById('surveyGoldenSpoons'),
           submitButton: () => document.querySelector('.btn-submit'),
           spinner: () => document.getElementById('loading-spinner'),
           surveyContent: () => document.getElementById('survey-content'),
           thankYouScreen: () => document.getElementById('thank-you-screen'),
           feedback: () => document.getElementById('feedback'),
           ratingError: () => document.getElementById('rating-error')
       };

       // Form Validation
       function validateForm() {
           const ratingError = elements.ratingError();
           const rating = document.querySelector('input[name="food_rating"]:checked');
           
           if (!rating) {
               ratingError.style.display = 'block';
               return false;
           }
           
           ratingError.style.display = 'none';
           
           const feedback = elements.feedback()?.value.trim();
           if (feedback && feedback.length > CONSTANTS.MAX_LENGTH) {
               return false;
           }
           
           return true;
       }

       // UI Helpers
       function toggleLoading(show) {
           const spinner = elements.spinner();
           const submitButton = elements.submitButton();
           
           if (spinner) {
               spinner.style.display = show ? 'block' : 'none';
           }
           
           if (submitButton) {
               submitButton.disabled = show;
           }
       }

       function showThankYouScreen() {
           const surveyContent = elements.surveyContent();
           const thankYouScreen = elements.thankYouScreen();
           
           if (surveyContent) {
               surveyContent.style.display = 'none';
           }
           
           if (thankYouScreen) {
               thankYouScreen.style.display = 'block';
               thankYouScreen.scrollIntoView({ behavior: 'smooth' });
           }
       }

       // Progress Management
       function saveProgress() {
           try {
               const formData = collectFormData();
               localStorage.setItem(CONSTANTS.LOCAL_STORAGE_KEY, JSON.stringify(formData));
           } catch (error) {
               console.error('Error saving progress:', error);
           }
       }

       function restoreProgress() {
           try {
               const saved = localStorage.getItem(CONSTANTS.LOCAL_STORAGE_KEY);
               if (saved) {
                   const data = JSON.parse(saved);
                   restoreFormData(data);
               }
           } catch (error) {
               console.error('Error restoring progress:', error);
           }
       }

       function collectFormData() {
           return {
               rating: document.querySelector('input[name="food_rating"]:checked')?.value || '',
               feedback: elements.feedback()?.value.trim() || ''
           };
       }

       function restoreFormData(data) {
           if (data.rating) {
               const ratingInput = document.querySelector(`input[name="food_rating"][value="${data.rating}"]`);
               if (ratingInput) ratingInput.checked = true;
           }
           
           if (data.feedback && elements.feedback()) {
               elements.feedback().value = data.feedback;
           }
       }

       // Form Submission
       async function submitSurvey() {
           if (isSubmitting) return;
           if (!validateForm()) return;

           const form = elements.form();
           if (!form) return;

           isSubmitting = true;
           toggleLoading(true);

           try {
               const now = new Date();
               const vnTime = new Date(now.getTime());
               
               const formData = new FormData(form);
               
               // Set form data
               formData.set('rating', document.querySelector('input[name="food_rating"]:checked')?.value || '');
               formData.set('feedback', elements.feedback()?.value.trim() || '');
               formData.set('mobile', appSmartechSDKData.identity);
               formData.set('survey_name', CONSTANTS.SURVEY_NAME);

               // Send analytics data
               smartech('identify', appSmartechSDKData.identity);
               smartech('dispatch', 'survey_complete', {
                   'survey_name': CONSTANTS.SURVEY_NAME,
                   'source': 'in-app banner',
                   'completion_time': Math.floor((Date.now() - startTime) / 1000),
                   'survey_status': 'completed',
                   'rating': parseInt(formData.get('rating')) || 0,
                   'customer_feedback': formData.get('feedback'),
                   'submit_date': vnTime.toISOString().split('T')[0],
                   'submit_time': vnTime.toTimeString().split(' ')[0]
               });

               // Show thank you screen immediately
               showThankYouScreen();

               // Send form data to server
               try {
                   const response = await fetch(form.getAttribute('action-xhr'), {
                       method: 'POST',
                       body: formData
                   });
                   
                   if (!response.ok) {
                       console.error('Form submission failed but user flow continued');
                   }
               } catch (error) {
                   console.error('Form submission error but user flow continued:', error);
               }

               // Clear saved progress
               localStorage.removeItem(CONSTANTS.LOCAL_STORAGE_KEY);

               // Close popup after delay
               setTimeout(() => {
                   if (window.closePopup && typeof window.closePopup === 'function') {
                       window.closePopup();
                   }
               }, CONSTANTS.THANK_YOU_DELAY);

           } catch (error) {
               console.error('Error in submit flow:', error);
               alert('Có lỗi xảy ra. Vui lòng thử lại sau.');
           } finally {
               isSubmitting = false;
               toggleLoading(false);
           }
       }

       // Text area character limit
       function handleTextAreaInput(event) {
           const textarea = event.target;
           if (textarea.value.length > CONSTANTS.MAX_LENGTH) {
               textarea.value = textarea.value.slice(0, CONSTANTS.MAX_LENGTH);
           }
           saveProgress();
       }

       // Emoji Rating Handler
       function handleRatingChange(event) {
           if (event.target.name === 'food_rating') {
               elements.ratingError().style.display = 'none';
               saveProgress();
           }
       }

       // Initialize
       document.addEventListener('DOMContentLoaded', () => {
           // Restore saved progress
           restoreProgress();
           
           // Setup textarea handler
           const textarea = elements.feedback();
           if (textarea) {
               textarea.addEventListener('input', handleTextAreaInput);
           }
           
           // Setup rating change handler
           const ratingInputs = document.querySelectorAll('input[name="food_rating"]');
           ratingInputs.forEach(input => {
               input.addEventListener('change', handleRatingChange);
           });
           
           // Setup form autosave
           const form = elements.form();
           if (form) {
               form.addEventListener('change', saveProgress);
           }
           
           // Setup window events
           window.addEventListener('beforeunload', saveProgress);
       });
   </script>

</body></html>
